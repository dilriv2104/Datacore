<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATACORE - Login</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="contenedor-login">

    <div class="logo">
      <img src="img/logo.png" alt="Logo DataCore" class="logo-img">
        <h1>DATACORE</h1>
        <p class="subtitulo">Sistema de gestion de inventario</p>
    </div>

    <hr>

    <form>

        <label>Usuario</label>

        <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Ingrese su usuario">
        </div>

        <label>Contraseña</label>

        <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input type="password" placeholder="Ingrese su contraseña">
            <i class="fa-regular fa-eye"></i>
        </div>

        <div class="opciones">
            <div>
                <input type="checkbox">
                Recordar
            </div>

            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button>
            <a href="dashboard.html">inicia sesión</a>
        </button>

        <div class="registro">
            <a href="login.html">registrate</a>
        </div>

    </form>

    <div class="footer">
        🔒 © 2026 DataCore • Todos los derechos reservados
    </div>

</div>

</body>
</html>
