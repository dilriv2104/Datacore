<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DATACORE</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="contenedor">

    <div class="logo">
        <img src="img/logo.png" alt="Logo DataCore" class="logo-img">
        <h1>DATACORE</h1>
    </div>

    <p class="subtitulo">Crear Nueva Cuenta</p>

    <hr>

    <form>

        <label>Nombre usuario</label>
        <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Ingrese su usuario">
        </div>

        <label>Nombre empresa</label>
        <div class="input-box">
            <i class="fa-regular fa-building"></i>
            <input type="text" placeholder="Ingrese nombre empresa">
        </div>

        <label>Correo electronico</label>
        <div class="input-box">
            <i class="fa-regular fa-at"></i>
            <input type="email" placeholder="Ingrese un correo">
        </div>

        <label>Contraseña</label>
        <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input type="password" placeholder="Ingrese una contraseña">
            <i class="fa-regular fa-eye"></i>
        </div>

        <label>Confirme contraseña</label>
        <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input type="password" placeholder="Ingrese contraseña">
            <i class="fa-regular fa-eye"></i>
        </div>

        <div class="terminos">
            <input type="checkbox">

            <span>
                Acepto los
                <a href="#">Terminos y condiciones</a>
                y la
                <a href="#">politica de privacidad</a>
            </span>
        </div>
        
        <button type="submit" href="index.html">
            <a href="index.html">Crea cuentas</a>
        </button>

        <div class="login">
            ¿Ya tiene cuenta?
            <a href="index.html">iniciar sesion</a>
        </div>

    </form>

</div>

</body>
</html>
